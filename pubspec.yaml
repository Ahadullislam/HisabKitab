name: hishab_kitab
description: "A personal finance tracker for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.68.0

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.12.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Security
  local_auth: ^2.2.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  iconsax: ^0.0.8
  percent_indicator: ^4.2.3

  # Animations
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # Modern UI
  shimmer: ^3.0.0
  modal_bottom_sheet: ^3.0.0-pre
  dotted_border: ^2.1.0
  flutter_slidable: ^3.1.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  analyzer: ^6.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/